server:
  port: 8080

spring:
  application:
    name: project-graveyard-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:project_graveyard}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:M2Y1Zjc4OTBhMTJiMzRjNTZkN2U4ZjlhMDFiMmNkN2U4ZjlhMDFiMmNkN2U4ZjlhMDFiMmNkN2U4ZjlhMDFiMg==}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Enable swagger-ui and openapi docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
